<!doctype html>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" crossorigin="anonymous">

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-8 col-lg-6">

      <div class="card shadow-sm">
        <div class="card-body">

          <h4 class="card-title mb-4">Nova Auditoria</h4>

          <form method="post">
            {% csrf_token %}

            <div class="mb-3">
              <label class="form-label">Nº Relatório</label>
              <input type="number" name="num_relatorio" value="{{proximo}}" class="form-control">
            </div>

            <div class="mb-3">
              <label class="form-label">Local</label>
              <input type="text" name="local" class="form-control">
            </div>

            <div class="mb-3">
              <label class="form-label">Auditor</label>

              {% if request.user.is_authenticated %}
                <input type="text"
                       name="auditor"
                       value="{{ request.user.get_full_name|default:request.user.username }}"
                       readonly
                       class="form-control">
              {% else %}
                <input type="text" name="auditor" class="form-control">
              {% endif %}

            </div>

            <button type="submit" class="btn btn-primary w-100">
              Iniciar Auditoria
            </button>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
