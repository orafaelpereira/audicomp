<!doctype html>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" crossorigin="anonymous">

<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0">Criar Usuário</h2>
    <a href="/" class="btn btn-outline-secondary">Voltar</a>
  </div>

  {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Nome de usuário</label>
      <input name="username" class="form-control" required>
    </div>
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Nome</label>
        <input name="first_name" class="form-control">
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Sobrenome</label>
        <input name="last_name" class="form-control">
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input name="email" type="email" class="form-control">
    </div>
    <div class="mb-3">
      <label class="form-label">Senha</label>
      <input name="password1" type="password" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Confirme a senha</label>
      <input name="password2" type="password" class="form-control" required>
    </div>
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" value="1" id="is_staff" name="is_staff">
      <label class="form-check-label" for="is_staff">Criar como staff</label>
    </div>
    <button class="btn btn-primary">Criar</button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
