<!-- Bootstrap-styled, responsive auditoria form -->
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" crossorigin="anonymous">

<div class="container-fluid py-3">
  <h2 class="mb-4">Itens da Auditoria</h2>

  <form method="post" id="auditoriaForm">
    {% csrf_token %}

    {% comment %} usando regroup sobre 'itens' como antes {% endcomment %}
    {% regroup itens by grupo as grupos %}

    <div id="pages">
      {% for grupo in grupos %}
        <div class="page card mb-3 p-3 {% if not forloop.first %}d-none{% endif %}" data-page-index="{{ forloop.counter0 }}">
          <h3 class="card-title">{{ grupo.grouper }}</h3>
          <div class="card-body">
            {% for item in grupo.list %}
            <div class="mb-3">
              <p class="mb-2 fw-semibold">{{ item.descricao }}</p>

              <div class="d-flex flex-column flex-sm-row gap-2 align-items-start">
                <div class="form-check">
                  <input class="form-check-input status" type="radio" name="item_{{item.id}}" id="item_{{item.id}}_C" value="C" data-id="{{item.id}}">
                  <label class="form-check-label" for="item_{{item.id}}_C">Conforme</label>
                </div>

                <div class="form-check">
                  <input class="form-check-input status" type="radio" name="item_{{item.id}}" id="item_{{item.id}}_NC" value="NC" data-id="{{item.id}}">
                  <label class="form-check-label text-danger" for="item_{{item.id}}_NC">Não Conforme</label>
                </div>

                <div class="form-check">
                  <input class="form-check-input status" type="radio" name="item_{{item.id}}" id="item_{{item.id}}_NA" value="NA" data-id="{{item.id}}" checked>
                  <label class="form-check-label" for="item_{{item.id}}_NA">Não Aplica</label>
                </div>
              </div>

              <!-- bloco de motivo/tratativa, só aparece para NC -->
              <div id="extra_{{item.id}}" class="mt-3 ps-3 d-none">
                <label class="form-label small">Motivo da não conformidade:</label>
                <textarea name="motivo_{{item.id}}" class="form-control mb-2" rows="2"></textarea>
                <label class="form-label small">Tratativa:</label>
                <textarea name="tratativa_{{item.id}}" class="form-control" rows="2"></textarea>
              </div>

            </div>
            <hr>
            {% endfor %}
          </div>
        </div>
      {% endfor %}
    </div>

    <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center mt-3 gap-2">
      <div class="w-100 text-start">
        <button type="button" id="prevBtn" class="btn btn-secondary w-100" style="display:none;">&laquo; Voltar</button>
      </div>
      <div class="d-flex gap-2 w-100" style="max-width:480px;">
        <button type="button" id="nextBtn" class="btn btn-primary flex-fill">Avançar &raquo;</button>
        <button type="submit" id="submitBtn" class="btn btn-success flex-fill" style="display:none;">Finalizar Auditoria</button>
      </div>
    </div>

  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

<script>
(function(){
  var pages = Array.from(document.querySelectorAll('.page'));
  var current = 0;
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');
  var submitBtn = document.getElementById('submitBtn');

  function showPage(index){
    pages.forEach(function(p, i){
      p.classList.toggle('d-none', i !== index);
    });
    current = index;
    prevBtn.style.display = (current === 0) ? 'none' : 'inline-block';
    if(current === pages.length - 1){
      nextBtn.style.display = 'none';
      submitBtn.style.display = 'inline-block';
    } else {
      nextBtn.style.display = 'inline-block';
      submitBtn.style.display = 'none';
    }
    var containerEl = document.querySelector('.container-fluid') || document.querySelector('.container');
    if(containerEl){
      window.scrollTo({ top: containerEl.offsetTop - 10, behavior: 'smooth' });
    }
  }

  prevBtn.addEventListener('click', function(){
    if(current > 0) showPage(current - 1);
  });

  nextBtn.addEventListener('click', function(){
    if(current < pages.length - 1) showPage(current + 1);
  });

  // Mostrar motivo/tratativa apenas para NC
  document.addEventListener('change', function(e){
    if(e.target.classList && e.target.classList.contains('status')){
      var id = e.target.getAttribute('data-id');
      var div = document.getElementById('extra_'+id);
      if(e.target.value === 'NC'){
        div.classList.remove('d-none');
      } else {
        div.classList.add('d-none');
      }
    }
  });

  // Inicializa visibilidade no carregamento
  document.addEventListener('DOMContentLoaded', function(){
    pages.forEach(function(p){
      var radios = p.querySelectorAll('input.status');
      radios.forEach(function(r){
        var id = r.getAttribute('data-id');
        var div = document.getElementById('extra_'+id);
        if(r.checked && r.value === 'NC'){
          div.classList.remove('d-none');
        } else {
          div.classList.add('d-none');
        }
      });
    });
  });

  if(pages.length) showPage(0);
})();
</script>
